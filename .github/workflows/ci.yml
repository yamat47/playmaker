name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一ブランチで新しい push があれば実行中の古い run をキャンセルする
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# JS アクション(checkout/setup-node 等)を最新の Node 24 ランタイムで動かす
# （Node 20 ランタイムは非推奨。GitHub 強制移行前に先取りする）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: typecheck / lint / test / build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # バージョンは package.json の packageManager フィールドから解決される
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint (Biome)
        run: pnpm run lint

      - name: Test (Vitest)
        run: pnpm run test

      - name: Build (Vite library mode)
        run: pnpm run build
