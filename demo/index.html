<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playmaker Playground</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, sans-serif;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 8px 12px;
        border-bottom: 1px solid #ddd;
        font-size: 14px;
      }
      #controls {
        display: flex;
        gap: 6px;
      }
      #controls button {
        padding: 4px 10px;
        font: inherit;
        cursor: pointer;
      }
      #controls button[aria-pressed="true"] {
        background: #1565c0;
        color: #fff;
        border-color: #1565c0;
      }
      #stage {
        flex: 1;
        min-height: 0;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <span>Playmaker Playground — M3: 線（view モード完成）</span>
        <div id="controls"></div>
      </header>
      <div id="stage"></div>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
